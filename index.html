<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>פאנל מודים - אולפן אלדן רינג</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #121212; color: #ffffff; padding: 20px; display: flex; justify-content: center; }
        .main-container { display: flex; gap: 20px; max-width: 950px; width: 100%; align-items: flex-start;}
        .panel-column { flex: 1; background: #1e1e1e; padding: 25px; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); position: relative; }
        
        h2 { text-align: center; color: #d4af37; border-bottom: 1px solid #333; padding-bottom: 10px; margin-top:0;}
        .section { background: #252525; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #333; }
        h3 { margin-top: 0; font-size: 15px; color: #ccc; }
        
        .controls { display: flex; gap: 8px; margin-bottom: 10px; }
        button { padding: 10px; border: none; border-radius: 5px; background: #444; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #555; }
        
        .btn-active { background: #28a745; color: white; border: 2px solid #fff;}
        .btn-red { background: #cc3333; } .btn-red:hover { background: #ff4a4a; }
        .btn-gold { background: #d4af37; color: #111; } .btn-gold:hover { background: #f0d494; }
        .btn-blue { background: #007bff; } .btn-blue:hover { background: #3395ff; }

        input { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #444; background: #111; color: white; box-sizing: border-box; }
        
        .search-results { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; margin-top: 10px; }
        .boss-search-card { background: #111; padding: 10px; border-radius: 6px; display: flex; align-items: center; gap: 10px; cursor: pointer; border: 1px solid #333; }
        .boss-search-card:hover { border-color: #d4af37; background: #222; }
        .boss-search-card img { width: 50px; height: 50px; border-radius: 4px; object-fit: cover; }
        
        .boss-list-preview { background: #111; padding: 10px; border-radius: 5px; max-height: 350px; overflow-y: auto; font-size: 13px; }
        .boss-entry { border-bottom: 1px solid #333; padding: 8px 0; display: flex; justify-content: space-between; align-items: center; }
        .action-btns { display: flex; gap: 5px; }
        .edit-btn { background: #e2c073; color: #000; padding: 4px 8px; font-size: 12px; }
        .delete-btn { background: #ff4a4a; color: #fff; padding: 4px 8px; font-size: 12px; }
        
        .edit-row { display: flex; flex-direction: column; gap: 5px; background: #222; padding: 10px; border-radius: 4px; border: 1px solid #d4af37; }
        .edit-row input { margin-bottom: 0; padding: 5px; font-size: 12px; }

        /* --- עיצוב תפריט ההמבורגר --- */
        .hamburger-menu { position: absolute; top: 15px; left: 15px; z-index: 100; }
        .hamburger-icon { 
            cursor: pointer; font-size: 18px; color: #888; padding: 5px; 
            border-radius: 4px; transition: 0.2s; user-select: none;
        }
        .hamburger-icon:hover { color: #fff; background: #333; }
        .hamburger-dropdown { 
            display: none; position: absolute; left: 0; top: 35px; background: #1a1a1a; 
            border: 1px solid #444; border-radius: 6px; box-shadow: 0 4px 15px rgba(0,0,0,0.9); 
            padding: 10px; width: 140px; 
        }
        .hamburger-dropdown button { width: 100%; font-size: 12px; padding: 8px; margin-bottom: 5px; }
        .hamburger-dropdown button:last-child { margin-bottom: 0; }
        .show-menu { display: block; }
    </style>
</head>
<body>

    <div class="main-container">
        
        <div class="panel-column">
            <h2>⚔️ ניהול קרב נוכחי בלייב</h2>
            
            <div class="section" id="active-boss-section">
                <div style="display: flex; gap: 5px; margin-bottom: 10px;">
                    <input type="text" id="api-search" placeholder="חפש בוס במאגר (אנגלית)..." style="font-size:12px; margin-bottom:0;">
                    <button class="btn-blue" style="font-size:12px; padding:5px 15px;" onclick="searchBossApi()">חפש</button>
                </div>
                <div class="search-results" id="api-results-container" style="max-height: 150px; margin-bottom: 15px;"></div>

                <div id="start-boss-form">
                    <input type="text" id="cb-name-input" placeholder="שם הבוס">
                    <input type="text" id="cb-img-input" placeholder="לינק לתמונה (אופציונלי)">
                    <button class="btn-gold" style="width: 100%;" onclick="startBossFight()">התחל קרב (יפעיל טיימר בוס)</button>
                </div>
                
                <div id="finish-boss-form" style="display: none; text-align: center;">
                    <p>נלחם עכשיו נגד: <strong id="active-boss-name-label" style="color: #d4af37;">---</strong></p>
                    
                    <div style="display: flex; gap: 5px; margin-bottom: 15px; border-bottom: 1px solid #444; padding-bottom: 15px;">
                        <input type="text" id="cb-live-img-input" placeholder="הדבק לינק חדש לתמונה..." style="margin-bottom: 0; font-size: 11px;">
                        <button class="btn-blue" style="padding: 5px 10px; font-size: 12px; white-space: nowrap;" onclick="updateLiveBossImage()">עדכן תמונה</button>
                    </div>

                    <input type="number" id="cb-deaths-input" placeholder="מיתות בבוס הזה (מתעדכן לבד)">
                    <button class="btn-active" style="width: 100%;" onclick="finishBossFight()">🏆 הבוס הובס! (יוסיף לרשימה)</button>
                    <button class="btn-red" style="width: 100%; margin-top: 10px;" onclick="cancelBossFight()">בטל קרב נוכחי</button>
                </div>
            </div>

            <div class="section">
                <h3>⏱️ הוספת בוס מהעבר (ידני / חיפוש)</h3>
                
                <div style="display: flex; gap: 5px; margin-bottom: 10px;">
                    <input type="text" id="hist-api-search" placeholder="חפש בוס מהעבר במאגר..." style="font-size:12px; margin-bottom:0;">
                    <button class="btn-blue" style="font-size:12px; padding:5px 15px;" onclick="searchHistBossApi()">חפש</button>
                </div>
                <div class="search-results" id="hist-api-results-container" style="max-height: 150px; margin-bottom: 10px;"></div>

                <div style="display: flex; gap: 5px; margin-bottom: 5px;">
                    <input type="text" id="hist-name" placeholder="שם הבוס" style="flex: 2;">
                    <input type="text" id="hist-time" placeholder="זמן (למשל 10:25)" style="flex: 1;">
                    <input type="number" id="hist-deaths" placeholder="מיתות" style="flex: 1;">
                </div>
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="hist-img" placeholder="לינק לתמונה" style="flex: 3;">
                    <button class="btn-blue" style="flex: 1;" onclick="addHistoricalBoss()">הוסף</button>
                </div>
            </div>
        </div>

        <div class="panel-column">
            
            <div class="hamburger-menu">
                <div class="hamburger-icon" onclick="toggleMenu()" title="אפשרויות מסוכנות">☰</div>
                <div class="hamburger-dropdown" id="danger-menu">
                    <button class="btn-red" onclick="resetTimer()">🔄 איפוס טיימר ראשי</button>
                    <button class="btn-red" onclick="resetDeaths()">💀 איפוס כל המיתות</button>
                </div>
            </div>

            <h2>🎮 בקרת סטרים מרכזית</h2>

            <div class="section" style="border-color: #d4af37;">
                <h3 style="text-align: center; color: #d4af37;">מצב תצוגה במסך (אולפן):</h3>
                <div class="controls">
                    <button id="btn-mode-fight" style="flex:1" onclick="setDisplayMode('fighting')">⚔️ נלחם עכשיו</button>
                    <button id="btn-mode-sleep" style="flex:1" onclick="setDisplayMode('sleeping')">💤 ישן (פרומפטר)</button>
                </div>
                <button id="btn-mode-complete" class="btn-gold" style="width: 100%; margin-top: 5px; font-size: 16px; border: 1px solid #a38222;" onclick="setCompletedMode()">🏆 סיום משחק (סיכום)</button>
            </div>

            <div class="section">
                <h3>💀 מיתות גלובליות (<span id="current-deaths">0</span>)</h3>
                <div class="controls">
                    <button class="btn-red" style="flex:1" onclick="updateDeaths(1)">+ הוסף מיתה</button>
                    <button style="flex:1" onclick="updateDeaths(-1)">- הורד מיתה</button>
                </div>
                <p style="font-size: 11px; color:#aaa; margin:0; text-align:center;">לחיצה מוסיפה מיתה גם לבוס הפעיל אוטומטית!</p>
            </div>

            <div class="section">
                <h3>⏱️ שליטה בטיימר הראשי</h3>
                <button id="btn-timer-toggle" class="btn-gold" style="width: 100%;" onclick="toggleTimer()">⏸️ השהה טיימר</button>
                <p style="font-size: 10px; color:#666; margin: 5px 0 0 0; text-align:center;">(איפוס הטיימר עבר לתפריט ה-☰ למעלה)</p>
            </div>

            <div class="section">
                <h3>רשימת בוסים שהובסו</h3>
                <div class="boss-list-preview" id="boss-preview"></div>
            </div>
        </div>

    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://eldenring-6b07a-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentDeaths = 0;
        let currentBosses = [];
        let activeBossData = null;
        let timerData = { isRunning: true, startTime: Date.now(), accumulated: 0 };
        let editingIndex = -1; 

        // --- מנגנון תפריט המבורגר (סגירה אוטומטית כשלוחצים בחוץ) ---
        function toggleMenu() {
            document.getElementById("danger-menu").classList.toggle("show-menu");
        }
        window.onclick = function(event) {
            if (!event.target.matches('.hamburger-icon')) {
                var dropdowns = document.getElementsByClassName("hamburger-dropdown");
                for (var i = 0; i < dropdowns.length; i++) {
                    var openDropdown = dropdowns[i];
                    if (openDropdown.classList.contains('show-menu')) {
                        openDropdown.classList.remove('show-menu');
                    }
                }
            }
        }

        // --- מנגנון נעילת כפתורים (Cooldown) ---
        function lockButtons() {
            const allButtons = document.querySelectorAll('button');
            allButtons.forEach(btn => {
                btn.style.opacity = '0.5';
                btn.style.pointerEvents = 'none';
            });
            setTimeout(() => {
                allButtons.forEach(btn => {
                    btn.style.opacity = '1';
                    btn.style.pointerEvents = 'auto';
                });
            }, 1000);
        }

        // --- האזנות ---
        db.ref('elden/deaths').on('value', snap => {
            currentDeaths = snap.val() || 0;
            document.getElementById('current-deaths').innerText = currentDeaths;
        });

        db.ref('elden/display_mode').on('value', snap => {
            const mode = snap.val() || 'fighting';
            document.getElementById('btn-mode-fight').className = mode === 'fighting' ? 'btn-active' : '';
            document.getElementById('btn-mode-sleep').className = mode === 'sleeping' ? 'btn-active' : '';
            document.getElementById('btn-mode-complete').className = mode === 'completed' ? 'btn-active' : 'btn-gold';
        });

        db.ref('elden/main_timer').on('value', snap => {
            if (snap.val()) timerData = snap.val();
            const btn = document.getElementById('btn-timer-toggle');
            if (timerData.isRunning) {
                btn.innerText = "⏸️ השהה טיימר";
                btn.className = "btn-gold";
            } else {
                btn.innerText = "▶️ המשך טיימר";
                btn.className = "btn-active";
            }
        });

        db.ref('elden/current_boss').on('value', snap => {
            activeBossData = snap.val();
            if(activeBossData && activeBossData.active) {
                document.getElementById('start-boss-form').style.display = 'none';
                document.getElementById('finish-boss-form').style.display = 'block';
                document.getElementById('active-boss-name-label').innerHTML = `${activeBossData.name} <span style="color:#ff4a4a;">(💀 ${activeBossData.deaths || 0})</span>`;
                document.getElementById('cb-deaths-input').value = activeBossData.deaths || 0;
            } else {
                document.getElementById('start-boss-form').style.display = 'block';
                document.getElementById('finish-boss-form').style.display = 'none';
            }
        });

        db.ref('elden/bosses').on('value', snap => {
            currentBosses = snap.val() || [];
            renderBossList();
        });

        function renderBossList() {
            const preview = document.getElementById('boss-preview');
            preview.innerHTML = '';
            
            currentBosses.forEach((boss, index) => {
                if (editingIndex === index) {
                    preview.innerHTML += `
                        <div class="edit-row">
                            <div style="display:flex; gap:5px;">
                                <input type="text" id="edit-name-${index}" value="${boss.name}" style="flex:2" placeholder="שם הבוס">
                                <input type="text" id="edit-time-${index}" value="${boss.time}" style="flex:1" title="זמן">
                                <input type="number" id="edit-deaths-${index}" value="${boss.deaths}" style="flex:1" title="מיתות">
                            </div>
                            <div style="display:flex; gap:5px;">
                                <input type="text" id="edit-img-${index}" value="${boss.img || ''}" style="flex:3" placeholder="לינק לתמונה של הבוס">
                                <button class="btn-active" style="flex:1;" onclick="saveEdit(${index})">💾</button>
                                <button class="btn-red" onclick="cancelEdit()">X</button>
                            </div>
                        </div>
                    `;
                } else {
                    preview.innerHTML += `
                        <div class="boss-entry">
                            <span><strong>${boss.name}</strong> (⏱️ ${boss.time} | 💀 ${boss.deaths})</span>
                            <div class="action-btns">
                                <button class="edit-btn" onclick="startEdit(${index})">✏️</button>
                                <button class="delete-btn" onclick="removeBoss(${index})">🗑️</button>
                            </div>
                        </div>
                    `;
                }
            });
        }

        function setDisplayMode(mode) { 
            lockButtons();
            db.ref('elden/display_mode').set(mode); 
        }

        function setCompletedMode() {
            if(confirm("⚠️ אזהרה: בטוח שסיימת את המשחק? הריצה הושלמה? זה יעצור את הטיימר הראשי ויציג מסך סיכום ענק על הסטרים!")) {
                lockButtons();
                db.ref('elden/display_mode').set('completed');
                if (timerData.isRunning) {
                    let now = Date.now();
                    let newAcc = timerData.accumulated + (now - timerData.startTime);
                    db.ref('elden/main_timer').set({ isRunning: false, startTime: now, accumulated: newAcc });
                }
            }
        }

        function updateDeaths(amount) { 
            lockButtons();
            db.ref('elden/deaths').transaction((currentVal) => {
                return Math.max(0, (currentVal || 0) + amount);
            });
            if (activeBossData && activeBossData.active) {
                db.ref('elden/current_boss/deaths').transaction((currentVal) => {
                    return Math.max(0, (currentVal || 0) + amount);
                });
            }
        }

        // --- פונקציות האיפוס מההמבורגר ---
        function resetTimer() {
            if(confirm("⚠️ אזהרה חמורה: בטוח שאתה רוצה לאפס לגמרי את הטיימר הראשי ל-00:00:00? פעולה זו לא ניתנת לביטול!")) {
                lockButtons();
                db.ref('elden/main_timer').set({ isRunning: true, startTime: Date.now(), accumulated: 0 });
                document.getElementById("danger-menu").classList.remove("show-menu");
            }
        }

        function resetDeaths() {
            if(confirm("⚠️ אזהרה חמורה: בטוח שאתה רוצה לאפס את כמות המיתות הכללית ל-0? פעולה זו לא ניתנת לביטול!")) {
                lockButtons();
                db.ref('elden/deaths').set(0);
                document.getElementById("danger-menu").classList.remove("show-menu");
            }
        }

        function toggleTimer() {
            let now = Date.now();
            if (timerData.isRunning) {
                if(confirm("בטוח שאתה רוצה להשהות (לעצור) את הטיימר הראשי?")) {
                    lockButtons();
                    let newAcc = timerData.accumulated + (now - timerData.startTime);
                    db.ref('elden/main_timer').set({ isRunning: false, startTime: now, accumulated: newAcc });
                }
            } else {
                lockButtons();
                db.ref('elden/main_timer').set({ isRunning: true, startTime: now, accumulated: timerData.accumulated });
            }
        }

        // --- חיפוש בוס ללייב ---
        async function searchBossApi() {
            lockButtons();
            const query = document.getElementById('api-search').value.trim();
            const container = document.getElementById('api-results-container');
            if(!query) return;
            
            container.innerHTML = '<span style="color:#aaa;">מחפש נתונים ברשת...</span>';
            try {
                const response = await fetch(`https://eldenring.fanapis.com/api/bosses?name=${query}`);
                const data = await response.json();
                
                if(!data.data || data.data.length === 0) {
                    container.innerHTML = '<span style="color:#ff4a4a;">לא נמצא בוס כזה.</span>';
                    return;
                }
                container.innerHTML = '';
                data.data.forEach(boss => {
                    const img = boss.image || 'https://via.placeholder.com/50/333333/FFFFFF?text=💀';
                    container.innerHTML += `
                        <div class="boss-search-card" onclick="selectBossFromApi('${boss.name.replace(/'/g, "\\'")}', '${img}')">
                            <img src="${img}">
                            <div style="display:flex; flex-direction:column;">
                                <strong>${boss.name}</strong>
                                <span style="font-size:11px; color:#aaa;">${boss.region || 'Unknown Location'}</span>
                            </div>
                        </div>
                    `;
                });
            } catch(e) { container.innerHTML = '<span style="color:#ff4a4a;">שגיאה בחיבור למאגר.</span>'; }
        }

        function selectBossFromApi(name, imgUrl) {
            if (activeBossData && activeBossData.active) {
                if(confirm(`לעדכן את התמונה של הבוס הנוכחי (${activeBossData.name}) לתמונה של ${name}?`)) {
                    lockButtons();
                    db.ref('elden/current_boss/img').set(imgUrl);
                    document.getElementById('api-results-container').innerHTML = '<span style="color:#28a745;">✅ תמונה עודכנה בסטרים!</span>';
                }
            } else {
                document.getElementById('cb-name-input').value = name;
                document.getElementById('cb-img-input').value = imgUrl;
                document.getElementById('api-results-container').innerHTML = '<span style="color:#28a745;">✅ נטען לטופס הקרב.</span>';
            }
        }

        // --- חיפוש ייעודי לבוסים מהעבר ---
        async function searchHistBossApi() {
            lockButtons();
            const query = document.getElementById('hist-api-search').value.trim();
            const container = document.getElementById('hist-api-results-container');
            if(!query) return;
            
            container.innerHTML = '<span style="color:#aaa;">מחפש נתונים ברשת...</span>';
            try {
                const response = await fetch(`https://eldenring.fanapis.com/api/bosses?name=${query}`);
                const data = await response.json();
                
                if(!data.data || data.data.length === 0) {
                    container.innerHTML = '<span style="color:#ff4a4a;">לא נמצא בוס כזה. אפשר לכתוב ידנית.</span>';
                    return;
                }
                container.innerHTML = '';
                data.data.forEach(boss => {
                    const img = boss.image || 'https://via.placeholder.com/50/333333/FFFFFF?text=💀';
                    container.innerHTML += `
                        <div class="boss-search-card" onclick="selectHistBossFromApi('${boss.name.replace(/'/g, "\\'")}', '${img}')">
                            <img src="${img}">
                            <div style="display:flex; flex-direction:column;">
                                <strong>${boss.name}</strong>
                                <span style="font-size:11px; color:#aaa;">${boss.region || 'Unknown Location'}</span>
                            </div>
                        </div>
                    `;
                });
            } catch(e) { container.innerHTML = '<span style="color:#ff4a4a;">שגיאה בחיבור למאגר.</span>'; }
        }

        function selectHistBossFromApi(name, imgUrl) {
            document.getElementById('hist-name').value = name;
            document.getElementById('hist-img').value = imgUrl;
            document.getElementById('hist-api-results-container').innerHTML = '<span style="color:#28a745;">✅ נטען לטופס 'בוס מהעבר'. הוסף מיתות/זמן ולחץ הוסף.</span>';
        }

        // --- פעולות קרב ---
        function startBossFight() {
            const name = document.getElementById('cb-name-input').value;
            const img = document.getElementById('cb-img-input').value;
            if(!name) return alert("הכנס שם בוס או בחר מהרשימה");

            lockButtons();
            db.ref('elden/current_boss').set({ active: true, name: name, img: img, startTime: Date.now(), deaths: 0 });
            
            document.getElementById('cb-name-input').value = '';
            document.getElementById('cb-img-input').value = '';
            document.getElementById('api-search').value = '';
            document.getElementById('api-results-container').innerHTML = '';
        }

        function updateLiveBossImage() {
            const newImgUrl = document.getElementById('cb-live-img-input').value.trim();
            if(!newImgUrl) return alert("הכנס לינק לתמונה קודם");
            if (activeBossData && activeBossData.active) {
                lockButtons();
                db.ref('elden/current_boss/img').set(newImgUrl);
                document.getElementById('cb-live-img-input').value = '';
            }
        }

        function finishBossFight() {
            lockButtons();
            const deathsCount = document.getElementById('cb-deaths-input').value || 0;
            const elapsedMs = Date.now() - activeBossData.startTime;
            let totalSecs = Math.floor(elapsedMs / 1000);
            let h = Math.floor(totalSecs / 3600);
            let m = Math.floor((totalSecs % 3600) / 60).toString().padStart(2, '0');
            let s = (totalSecs % 60).toString().padStart(2, '0');
            let timeString = h > 0 ? `${h}:${m}:${s}` : `${m}:${s}`;

            const newBoss = { name: activeBossData.name, img: activeBossData.img, time: timeString, deaths: deathsCount };
            
            db.ref('elden/bosses').transaction((currentBossList) => {
                const list = currentBossList || [];
                list.push(newBoss);
                return list;
            });

            db.ref('elden/current_boss').set({ active: false });
        }

        function cancelBossFight() {
            if(confirm("לבטל את הקרב בלי לשמור?")) {
                lockButtons();
                db.ref('elden/current_boss').set({ active: false });
            }
        }

        function addHistoricalBoss() {
            const name = document.getElementById('hist-name').value.trim();
            const time = document.getElementById('hist-time').value.trim() || "00:00";
            const deaths = document.getElementById('hist-deaths').value || 0;
            const img = document.getElementById('hist-img').value.trim();

            if (!name) return alert("חובה להכניס לפחות את שם הבוס!");

            lockButtons();
            const newBoss = { name: name, img: img, time: time, deaths: deaths };

            db.ref('elden/bosses').transaction((currentBossList) => {
                const list = currentBossList || [];
                list.push(newBoss);
                return list;
            });

            document.getElementById('hist-name').value = '';
            document.getElementById('hist-time').value = '';
            document.getElementById('hist-deaths').value = '';
            document.getElementById('hist-img').value = '';
            document.getElementById('hist-api-search').value = '';
            document.getElementById('hist-api-results-container').innerHTML = '';
        }

        function removeBoss(index) {
            if(confirm("למחוק בוס זה מהסטרים?")) {
                lockButtons();
                const updatedBosses = currentBosses.filter((_, i) => i !== index);
                db.ref('elden/bosses').set(updatedBosses);
            }
        }

        function startEdit(index) { editingIndex = index; renderBossList(); }
        function cancelEdit() { editingIndex = -1; renderBossList(); }

        function saveEdit(index) {
            lockButtons();
            const newName = document.getElementById(`edit-name-${index}`).value;
            const newTime = document.getElementById(`edit-time-${index}`).value;
            const newDeaths = document.getElementById(`edit-deaths-${index}`).value;
            const newImg = document.getElementById(`edit-img-${index}`).value; 

            currentBosses[index].name = newName;
            currentBosses[index].time = newTime;
            currentBosses[index].deaths = newDeaths;
            if(newImg !== undefined) currentBosses[index].img = newImg;

            db.ref('elden/bosses').set(currentBosses);
            editingIndex = -1; 
        }
    </script>
</body>
</html>
