<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>פאנל מודים - אולפן אלדן רינג</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #121212; color: #ffffff; padding: 20px; display: flex; justify-content: center; }
        .main-container { display: flex; gap: 20px; max-width: 900px; width: 100%; }
        .panel-column { flex: 1; background: #1e1e1e; padding: 25px; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        
        h2 { text-align: center; color: #d4af37; border-bottom: 1px solid #333; padding-bottom: 10px; margin-top:0;}
        .section { background: #252525; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #333; }
        h3 { margin-top: 0; font-size: 15px; color: #ccc; }
        
        .controls { display: flex; gap: 8px; margin-bottom: 10px; }
        button { padding: 10px; border: none; border-radius: 5px; background: #444; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #555; }
        
        .btn-active { background: #28a745; color: white; border: 2px solid #fff;}
        .btn-red { background: #cc3333; } .btn-red:hover { background: #ff4a4a; }
        .btn-gold { background: #d4af37; color: #111; } .btn-gold:hover { background: #f0d494; }
        .btn-blue { background: #007bff; } .btn-blue:hover { background: #3395ff; }

        input { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #444; background: #111; color: white; box-sizing: border-box; }
        
        /* אזור חיפוש הבוסים */
        .search-results { display: flex; flex-direction: column; gap: 10px; max-height: 400px; overflow-y: auto; margin-top: 10px; }
        .boss-search-card { background: #111; padding: 10px; border-radius: 6px; display: flex; align-items: center; gap: 10px; cursor: pointer; border: 1px solid #333; }
        .boss-search-card:hover { border-color: #d4af37; background: #222; }
        .boss-search-card img { width: 50px; height: 50px; border-radius: 4px; object-fit: cover; }
        
        /* רשימת הבוסים שהובסו (עם עריכה) */
        .boss-list-preview { background: #111; padding: 10px; border-radius: 5px; max-height: 250px; overflow-y: auto; font-size: 13px; }
        .boss-entry { border-bottom: 1px solid #333; padding: 8px 0; display: flex; justify-content: space-between; align-items: center; }
        .action-btns { display: flex; gap: 5px; }
        .edit-btn { background: #e2c073; color: #000; padding: 4px 8px; font-size: 12px; }
        .delete-btn { background: #ff4a4a; color: #fff; padding: 4px 8px; font-size: 12px; }
        
        /* טופס עריכה קטן */
        .edit-row { display: flex; gap: 5px; background: #222; padding: 5px; border-radius: 4px; }
        .edit-row input { margin-bottom: 0; padding: 5px; }
    </style>
</head>
<body>

    <div class="main-container">
        
        <!-- עמודה ימנית - חיפוש בוסים חכם -->
        <div class="panel-column">
            <h2>🔍 מאגר בוסים (Elden Ring API)</h2>
            <div class="section">
                <p style="font-size: 13px; color:#aaa; margin-top:0;">חפש באנגלית, בחר מהרשימה וזה ייטען אוטומטית לטופס.</p>
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="api-search" placeholder="למשל: Margit, Radahn...">
                    <button class="btn-blue" onclick="searchBossApi()">חפש</button>
                </div>
                <div class="search-results" id="api-results-container">
                    <!-- התוצאות יופיעו כאן -->
                </div>
            </div>
            
            <!-- הוספת בוס קאסטום ישירות -->
            <div class="section" id="active-boss-section">
                <h3>⚔️ טעינת בוס לסטרים (קאסטום/אוטומטי)</h3>
                <div id="start-boss-form">
                    <input type="text" id="cb-name-input" placeholder="שם הבוס">
                    <input type="text" id="cb-img-input" placeholder="לינק לתמונה (אופציונלי)">
                    <button class="btn-gold" style="width: 100%;" onclick="startBossFight()">התחל קרב (יפעיל טיימר בוס)</button>
                </div>
                
                <div id="finish-boss-form" style="display: none; text-align: center;">
                    <p>נלחם עכשיו נגד: <strong id="active-boss-name-label" style="color: #d4af37;">---</strong></p>
                    <input type="number" id="cb-deaths-input" placeholder="כמה פעמים מתת בבוס הזה?">
                    <button class="btn-active" style="width: 100%;" onclick="finishBossFight()">🏆 הבוס הובס! (יוסיף לרשימה)</button>
                    <button class="btn-red" style="width: 100%; margin-top: 10px;" onclick="cancelBossFight()">בטל קרב נוכחי</button>
                </div>
            </div>
        </div>

        <!-- עמודה שמאלית - בקרת זרימת סטרים -->
        <div class="panel-column">
            <h2>🎮 בקרת סטרים מרכזית</h2>

            <div class="section" style="border-color: #d4af37;">
                <h3 style="text-align: center; color: #d4af37;">מצב תצוגה במסך:</h3>
                <div class="controls">
                    <button id="btn-mode-fight" style="flex:1" onclick="setDisplayMode('fighting')">⚔️ נלחם עכשיו</button>
                    <button id="btn-mode-sleep" style="flex:1" onclick="setDisplayMode('sleeping')">💤 ישן (פרומפטר)</button>
                </div>
            </div>

            <div class="section">
                <h3>💀 מיתות (<span id="current-deaths">0</span>)</h3>
                <div class="controls">
                    <button class="btn-red" style="flex:1" onclick="updateDeaths(1)">+ הוסף מיתה</button>
                    <button style="flex:1" onclick="updateDeaths(-1)">- הורד מיתה</button>
                </div>
            </div>

            <div class="section">
                <h3>⏱️ שליטה בטיימר הראשי</h3>
                <div class="controls">
                    <button id="btn-timer-toggle" class="btn-gold" style="flex:2" onclick="toggleTimer()">⏸️ השהה טיימר</button>
                    <button style="flex:1" onclick="resetTimer()">🔄 איפוס הכל</button>
                </div>
            </div>

            <div class="section">
                <h3>רשימת בוסים שהובסו</h3>
                <div class="boss-list-preview" id="boss-preview"></div>
            </div>
        </div>

    </div>

    <script>
        // חיבור לפיירבייס - הקישור מעודכן
        const firebaseConfig = { databaseURL: "https://eldenring-6b07a-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentDeaths = 0;
        let currentBosses = [];
        let activeBossData = null;
        let timerData = { isRunning: true, startTime: Date.now(), accumulated: 0 };
        let editingIndex = -1; // שמירת האינדקס של הבוס שעורכים כרגע

        // --- האזנות למסד הנתונים ---
        db.ref('elden/deaths').on('value', snap => {
            currentDeaths = snap.val() || 0;
            document.getElementById('current-deaths').innerText = currentDeaths;
        });

        db.ref('elden/display_mode').on('value', snap => {
            const mode = snap.val() || 'fighting';
            document.getElementById('btn-mode-fight').className = mode === 'fighting' ? 'btn-active' : '';
            document.getElementById('btn-mode-sleep').className = mode === 'sleeping' ? 'btn-active' : '';
        });

        db.ref('elden/main_timer').on('value', snap => {
            if (snap.val()) timerData = snap.val();
            const btn = document.getElementById('btn-timer-toggle');
            if (timerData.isRunning) {
                btn.innerText = "⏸️ השהה טיימר";
                btn.className = "btn-gold";
            } else {
                btn.innerText = "▶️ המשך טיימר";
                btn.className = "btn-active";
            }
        });

        db.ref('elden/current_boss').on('value', snap => {
            activeBossData = snap.val();
            if(activeBossData && activeBossData.active) {
                document.getElementById('start-boss-form').style.display = 'none';
                document.getElementById('finish-boss-form').style.display = 'block';
                document.getElementById('active-boss-name-label').innerText = activeBossData.name;
            } else {
                document.getElementById('start-boss-form').style.display = 'block';
                document.getElementById('finish-boss-form').style.display = 'none';
            }
        });

        // בניית רשימת הבוסים + מצב עריכה פנימי
        db.ref('elden/bosses').on('value', snap => {
            currentBosses = snap.val() || [];
            renderBossList();
        });

        function renderBossList() {
            const preview = document.getElementById('boss-preview');
            preview.innerHTML = '';
            
            currentBosses.forEach((boss, index) => {
                if (editingIndex === index) {
                    // מצב עריכה
                    preview.innerHTML += `
                        <div class="edit-row">
                            <input type="text" id="edit-name-${index}" value="${boss.name}" style="flex:2">
                            <input type="text" id="edit-time-${index}" value="${boss.time}" style="flex:1" title="זמן">
                            <input type="number" id="edit-deaths-${index}" value="${boss.deaths}" style="flex:1" title="מיתות">
                            <button class="btn-active" onclick="saveEdit(${index})">💾</button>
                            <button class="btn-red" onclick="cancelEdit()">X</button>
                        </div>
                    `;
                } else {
                    // מצב רגיל
                    preview.innerHTML += `
                        <div class="boss-entry">
                            <span><strong>${boss.name}</strong> (⏱️ ${boss.time} | 💀 ${boss.deaths})</span>
                            <div class="action-btns">
                                <button class="edit-btn" onclick="startEdit(${index})">✏️</button>
                                <button class="delete-btn" onclick="removeBoss(${index})">🗑️</button>
                            </div>
                        </div>
                    `;
                }
            });
        }

        // --- פעולות טיימר וניהול בסיסי ---
        function setDisplayMode(mode) { db.ref('elden/display_mode').set(mode); }
        function updateDeaths(amount) { db.ref('elden/deaths').set(Math.max(0, currentDeaths + amount)); }

        function toggleTimer() {
            let now = Date.now();
            if (timerData.isRunning) {
                // עוצרים: שומרים את הזמן שנצבר
                let newAcc = timerData.accumulated + (now - timerData.startTime);
                db.ref('elden/main_timer').set({ isRunning: false, startTime: now, accumulated: newAcc });
            } else {
                // ממשיכים: מתחילים לספור מהרגע הזה + מה שנצבר
                db.ref('elden/main_timer').set({ isRunning: true, startTime: now, accumulated: timerData.accumulated });
            }
        }

        function resetTimer() {
            if(confirm("בטוח שאתה רוצה לאפס לגמרי את הטיימר ל-00:00:00?")) {
                db.ref('elden/main_timer').set({ isRunning: true, startTime: Date.now(), accumulated: 0 });
            }
        }

        // --- מנוע חיפוש מה-API ---
        async function searchBossApi() {
            const query = document.getElementById('api-search').value.trim();
            const container = document.getElementById('api-results-container');
            if(!query) return;
            
            container.innerHTML = '<span style="color:#aaa;">מחפש נתונים ברשת...</span>';
            try {
                const response = await fetch(`https://eldenring.fanapis.com/api/bosses?name=${query}`);
                const data = await response.json();
                
                if(!data.data || data.data.length === 0) {
                    container.innerHTML = '<span style="color:#ff4a4a;">לא נמצא בוס כזה. אפשר לכתוב את השם ידנית בטופס למטה.</span>';
                    return;
                }
                
                container.innerHTML = '';
                data.data.forEach(boss => {
                    const img = boss.image || 'https://via.placeholder.com/50/333333/FFFFFF?text=💀';
                    // שימוש במרכאות בטוחות כדי להעביר את הנתונים לפונקציה
                    container.innerHTML += `
                        <div class="boss-search-card" onclick="selectBossFromApi('${boss.name.replace(/'/g, "\\'")}', '${img}')">
                            <img src="${img}">
                            <div style="display:flex; flex-direction:column;">
                                <strong>${boss.name}</strong>
                                <span style="font-size:11px; color:#aaa;">${boss.region || 'Unknown Location'}</span>
                            </div>
                        </div>
                    `;
                });
            } catch(e) {
                container.innerHTML = '<span style="color:#ff4a4a;">שגיאה בחיבור למאגר אלדן רינג.</span>';
            }
        }

        function selectBossFromApi(name, imgUrl) {
            document.getElementById('cb-name-input').value = name;
            document.getElementById('cb-img-input').value = imgUrl;
            document.getElementById('api-results-container').innerHTML = '<span style="color:#28a745;">✅ נטען בהצלחה לטופס למטה! לחץ על התחל קרב.</span>';
        }

        // --- פעולות בוס פעיל והיסטוריה ---
        function startBossFight() {
            const name = document.getElementById('cb-name-input').value;
            const img = document.getElementById('cb-img-input').value;
            if(!name) return alert("הכנס שם בוס או בחר מהרשימה");

            db.ref('elden/current_boss').set({ active: true, name: name, img: img, startTime: Date.now() });
            document.getElementById('cb-name-input').value = '';
            document.getElementById('cb-img-input').value = '';
            document.getElementById('api-search').value = '';
            document.getElementById('api-results-container').innerHTML = '';
        }

        function finishBossFight() {
            const deathsCount = document.getElementById('cb-deaths-input').value || 0;
            const elapsedMs = Date.now() - activeBossData.startTime;
            let totalSecs = Math.floor(elapsedMs / 1000);
            let h = Math.floor(totalSecs / 3600);
            let m = Math.floor((totalSecs % 3600) / 60).toString().padStart(2, '0');
            let s = (totalSecs % 60).toString().padStart(2, '0');
            let timeString = h > 0 ? `${h}:${m}:${s}` : `${m}:${s}`;

            const newBoss = { name: activeBossData.name, img: activeBossData.img, time: timeString, deaths: deathsCount };
            const updatedBosses = [...currentBosses, newBoss];
            
            db.ref('elden/bosses').set(updatedBosses);
            db.ref('elden/current_boss').set({ active: false });
            document.getElementById('cb-deaths-input').value = '';
        }

        function cancelBossFight() {
            if(confirm("לבטל את הקרב בלי לשמור?")) db.ref('elden/current_boss').set({ active: false });
        }

        function removeBoss(index) {
            if(confirm("למחוק בוס זה מהסטרים?")) {
                const updatedBosses = currentBosses.filter((_, i) => i !== index);
                db.ref('elden/bosses').set(updatedBosses);
            }
        }

        // --- מערכת עריכת בוסים ---
        function startEdit(index) {
            editingIndex = index;
            renderBossList(); // מרענן את הרשימה כדי להציג את תיבות הטקסט
        }

        function cancelEdit() {
            editingIndex = -1;
            renderBossList();
        }

        function saveEdit(index) {
            const newName = document.getElementById(`edit-name-${index}`).value;
            const newTime = document.getElementById(`edit-time-${index}`).value;
            const newDeaths = document.getElementById(`edit-deaths-${index}`).value;

            currentBosses[index].name = newName;
            currentBosses[index].time = newTime;
            currentBosses[index].deaths = newDeaths;

            db.ref('elden/bosses').set(currentBosses);
            editingIndex = -1; // סגירת מצב העריכה
        }
    </script>
</body>
</html>
